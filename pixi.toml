[workspace]
authors = ["Yang Li <ylee091126@gmail.com>"]
channels = ["conda-forge"]
name = "blunomy-python-test"
platforms = ["osx-arm64", "win-64"]
version = "0.1.0"

[tasks.research]
cmd = "python research/main.py"

[feature.research.tasks.lab]
cmd = "jupyter lab"

[tasks.solution]
cmd = "python solution/main.py"

[dependencies]
python = ">=3.14.4,<3.15"
numpy = ">=2.4.3,<3"
pandas = ">=3.0.2,<4"
matplotlib = ">=3.10.9,<4"
scikit-learn = ">=1.8.0,<2"
pyarrow = ">=24.0.0,<25"

[feature.research.dependencies]
jupyterlab = ">=4.5.7,<5"
ipykernel = ">=7.2.0,<8"

[environments]
research = { features = ["research"], solve-group = "shared" }
solution = { solve-group = "shared" }
